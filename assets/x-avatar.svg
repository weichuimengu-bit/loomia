<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" role="img" aria-label="Loomia">
  <defs>
    <filter id="b30" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <filter id="b60" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="55%" stop-color="#e0f2fe" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="#0a0a0b"/>

  <!-- Outer diffuse halo: ~320px diameter, opacity 0.2, blur 60 -->
  <circle cx="200" cy="200" r="160" fill="#7dd3fc" opacity="0.2" filter="url(#b60)"/>

  <!-- Main cyan light orb: ~240px diameter, blur 30 -->
  <circle cx="200" cy="200" r="120" fill="#7dd3fc" filter="url(#b30)"/>

  <!-- Hot white core: ~60px diameter, white center fading to transparent cyan -->
  <circle cx="200" cy="200" r="30" fill="url(#core)"/>
</svg>
